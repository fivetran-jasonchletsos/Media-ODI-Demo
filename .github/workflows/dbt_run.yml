name: dbt Run — Post Fivetran Sync (Athena / Iceberg)

on:
  schedule:
    - cron: "55 2,8,14,20 * * *"
  workflow_dispatch:

jobs:
  dbt_run:
    name: Build silver + gold marts on Athena
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ./transform
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      LAKE_BUCKET: ${{ secrets.LAKE_BUCKET }}
      ATHENA_WORKGROUP: ${{ secrets.ATHENA_WORKGROUP }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install "dbt-core>=1.7" "dbt-athena-community>=1.7"

      - working-directory: transform
        run: dbt deps --profiles-dir .

      - working-directory: transform
        run: dbt run --profiles-dir . --target dev

      - working-directory: transform
        run: dbt test --profiles-dir . --target dev
        continue-on-error: true

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="10" fill="#0e0d10"/>
  <!-- Lighthouse silhouette -->
  <g fill="#f7f3ec">
    <!-- Tower body -->
    <rect x="26" y="22" width="12" height="30" rx="1"/>
    <!-- Tower base wider -->
    <rect x="22" y="48" width="20" height="4"/>
    <!-- Lamp room (cylindrical top) -->
    <rect x="24" y="14" width="16" height="8" rx="1"/>
    <!-- Roof / spire -->
    <path d="M22 14 L32 6 L42 14 Z"/>
  </g>
  <!-- Magenta light beams -->
  <g stroke="#ff3e7f" stroke-width="2.5" stroke-linecap="round" opacity="0.85">
    <path d="M40 18 L56 12"/>
    <path d="M40 19 L58 18"/>
    <path d="M24 18 L8 12"/>
    <path d="M24 19 L6 18"/>
  </g>
  <!-- Cyan light dot at lamp center -->
  <circle cx="32" cy="18" r="2" fill="#00e5ff"/>
</svg>
